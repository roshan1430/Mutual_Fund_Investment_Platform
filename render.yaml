services:
  - type: web
    runtime: docker
    name: mutual-fund-frontend
    plan: free
    rootDir: frontend
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: API_PROXY_TARGET
        fromService:
          type: web
          name: mutual-fund-backend
          property: hostport

  - type: web
    runtime: docker
    name: mutual-fund-backend
    plan: free
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_DATASOURCE_HOST
        fromService:
          type: pserv
          name: mutual-fund-mysql
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromService:
          type: pserv
          name: mutual-fund-mysql
          property: port
      - key: SPRING_DATASOURCE_DATABASE
        fromService:
          type: pserv
          name: mutual-fund-mysql
          envVarKey: MYSQL_DATABASE
      - key: SPRING_DATASOURCE_USERNAME
        fromService:
          type: pserv
          name: mutual-fund-mysql
          envVarKey: MYSQL_USER
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: mutual-fund-mysql
          envVarKey: MYSQL_PASSWORD
      - key: APP_CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: mutual-fund-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: APP_MAIL_FROM
        sync: false

  - type: pserv
    runtime: docker
    name: mutual-fund-mysql
    plan: starter
    rootDir: render/mysql
    dockerfilePath: ./render/mysql/Dockerfile
    dockerContext: ./render/mysql
    envVars:
      - key: MYSQL_DATABASE
        value: mutual_fund_db
      - key: MYSQL_USER
        value: appuser
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
